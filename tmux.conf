# General Settings
# ----------------

# Make window and pane indexes start with 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows sequentially after closing any of them
set -g renumber-windows on

# Enable mouse
set -g mouse on

# Show notices when there is activity on another window
setw -g monitor-activity on
set -g visual-activity off

# Don't exit tmux when closing a session
set -g detach-on-destroy off

# Tell Tmux that outside terminal supports true color
set-option -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"

# Key bindings and mappings
# -------------------------

# Remap prefix from 'C-b' to 'C-Space'
unbind C-b
set -g prefix C-Space

# Break pane into new window
bind-key b break-pane -d

# Sesh session manager
# --------------------

# Open sesh session picker (prefix+s or Cmd+S via M-s)
bind-key s display-popup -E -w 80% -h 70% -d '#{pane_current_path}' -T 'Sesh' tv sesh
bind-key -n 'M-s' display-popup -E -w 80% -h 70% -d '#{pane_current_path}' -T 'Sesh' tv sesh

# Jump to (or create) frequently used sessions
bind-key '`' run-shell "sesh connect home"
bind-key D run-shell "sesh connect dotfiles"
bind-key N run-shell "sesh connect notes"

# Copy mode settings
# ------------------

# Use vim keybindings in copy mode
setw -g mode-keys vi

# Setup 'v' to begin selection as in Vim
bind-key -T copy-mode-vi v send-keys -X begin-selection

# Setup 'C-v' to begin rectangle selection as in Vim
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle\; send -X begin-selection

# Use Enter to trigger copy mode
bind Enter copy-mode

# Set fish as default shell
set -g default-command /opt/homebrew/bin/fish
set -g default-shell /opt/homebrew/bin/fish

# Plugin Settings
# ---------------

# List of plugins, supports `github_username/repo` or full git repo URLs
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux#v2.3.0'

# Catppuccin
# ----------

set -g @catppuccin_flavor 'macchiato'
set -g @catppuccin_window_status_style "basic"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W#{?window_zoomed_flag, 󰊓,}"
set -g @catppuccin_session_text " #{s|$HOME|~|:pane_current_path}#{?#{!=:#(git -C '#{pane_current_path}' branch --show-current 2>/dev/null),},  #(git -C '#{pane_current_path}' branch --show-current 2>/dev/null),}"

# Status bar
set -g status-position top
set -g status-left-length 100
set -g status-right-length 100

run ~/.tmux/plugins/tmux/catppuccin.tmux

# Must be set after catppuccin.tmux runs
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_session}"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

