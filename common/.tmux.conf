# General Settings
# ----------------

# Make window and pane indexes start with 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows sequentially after closing any of them
set -g renumber-windows on

# Enable mouse
set -g mouse on

# Show notices when there is activity on another window
setw -g monitor-activity on
set -g visual-activity off

# Don't exit tmux when closing a session
set -g detach-on-destroy off

# Tell Tmux that outside terminal supports true color
set-option -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"

# Key bindings and mappings
# -------------------------

# Remap prefix from 'C-b' to 'C-Space'
unbind C-b
set -g prefix C-Space

# Break pane into new window
bind-key b break-pane -d

# Jump to window by index with M-1 through M-5
bind-key -n 'M-1' select-window -t :1
bind-key -n 'M-2' select-window -t :2
bind-key -n 'M-3' select-window -t :3
bind-key -n 'M-4' select-window -t :4
bind-key -n 'M-5' select-window -t :5

# Switch windows with M-p / M-n
bind-key -n 'M-p' previous-window
bind-key -n 'M-n' next-window

# Move window left/right with M-< / M->
bind-key -n 'M-<' swap-window -t -1\; select-window -t -1
bind-key -n 'M->' swap-window -t +1\; select-window -t +1

# Create new window with M-c
bind-key -n 'M-c' new-window -c '#{pane_current_path}'

# Split pane vertically with M-|
bind-key -n 'M-|' split-window -h -c '#{pane_current_path}'

# Split pane horizontally with M--
bind-key -n 'M--' split-window -v -c '#{pane_current_path}'

# Zoom pane with M-z
bind-key -n 'M-z' resize-pane -Z

# Kill pane with M-x
bind-key -n 'M-x' kill-pane

# Move pane with M-H/J/K/L
bind-key -n 'M-H' swap-pane -U
bind-key -n 'M-L' swap-pane -D
bind-key -n 'M-K' swap-pane -U
bind-key -n 'M-J' swap-pane -D

# Resize pane with M-h/j/k/l
bind-key -n 'M-h' resize-pane -L 5
bind-key -n 'M-l' resize-pane -R 5
bind-key -n 'M-k' resize-pane -U 5
bind-key -n 'M-j' resize-pane -D 5


# Sesh session manager
# --------------------

# Open sesh session picker (prefix+s or M-s)
bind-key s display-popup -E -w 80% -h 70% -d '#{pane_current_path}' -T 'Sesh' tv sesh
bind-key -n 'M-s' display-popup -E -w 80% -h 70% -d '#{pane_current_path}' -T 'Sesh' tv sesh

# Switch to last session with M-a
bind-key -n 'M-a' run-shell "sesh last"

# Jump to (or create) frequently used sessions
bind-key '`' run-shell "sesh connect home"
bind-key D run-shell "sesh connect dotfiles"
bind-key N run-shell "sesh connect notes"
bind-key -n 'M-N' run-shell "sesh connect notes"
bind-key -n 'M-.' run-shell "sesh connect dotfiles"

# Copy mode settings
# ------------------

# Use vim keybindings in copy mode
setw -g mode-keys vi

# Setup 'v' to begin selection as in Vim
bind-key -T copy-mode-vi v send-keys -X begin-selection

# Setup 'C-v' to begin rectangle selection as in Vim
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle\; send -X begin-selection

# Use Enter to trigger copy mode
bind Enter copy-mode

# Set fish as default shell (resolve path cross-platform: macOS Homebrew,
# Linux Homebrew, or system PATH).
run-shell 'tmux set -g default-shell "$(command -v fish || echo /opt/homebrew/bin/fish)"'
run-shell 'tmux set -g default-command "$(command -v fish || echo /opt/homebrew/bin/fish)"'

# Plugin Settings
# ---------------

# List of plugins, supports `github_username/repo` or full git repo URLs
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux#v2.3.0'

# Catppuccin
# ----------

set -g @catppuccin_flavor 'macchiato'
set -g @catppuccin_window_status_style "basic"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W#{?window_zoomed_flag, 󰊓,}"
set -g @catppuccin_session_text " #{s|$HOME|~|:pane_current_path}#{?#{!=:#(git -C '#{pane_current_path}' branch --show-current 2>/dev/null),},  #(git -C '#{pane_current_path}' branch --show-current 2>/dev/null),}"

# Status bar
set -g status-position top
set -g status-left-length 100
set -g status-right-length 100

run ~/.tmux/plugins/tmux/catppuccin.tmux

# Must be set after catppuccin.tmux runs
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_session}"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

